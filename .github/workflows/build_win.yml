name: Windows build

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  release:
    types: [created]

permissions:
  contents: write

jobs:
  build-windows:
    name: Windows 64-bit
    runs-on: windows-latest

    env:
      BITS: 64
      R_ARCH: x64
      Q_ARCH: w64
      R_HOME: C:\R

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.5.3"

      - name: Verify R installation
        shell: cmd
        run: |
          echo Checking R installation...
          echo R_HOME is: %R_HOME%
          for /f "delims=" %%i in ('R.exe RHOME') do set R_HOME=%%i
          echo R_HOME is: %R_HOME%
          set PATH=%R_HOME%\bin;%R_HOME%\bin\x64;%PATH%
          R.exe --version
          if errorlevel 1 exit /b 1

      - name: Show R installation
        shell: cmd
        run: |
          echo Checking R installation...
          set PATH=%R_HOME%\bin;%R_HOME%\bin\x64;%PATH%
          R.exe --version
          R.exe RHOME

      - name: Build embedr.dll
        shell: cmd
        run: |
          for /f "delims=" %%i in ('R.exe RHOME') do set R_HOME=%%i
          set PATH=%R_HOME%\bin;%R_HOME%\bin\x64;%PATH%
          mkdir %Q_ARCH%
          R.exe CMD SHLIB -o %Q_ARCH%/embedr.dll embedr.c src/%Q_ARCH%/q.a -lws2_32

      - name: Package distribution
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}" -replace '[\\/:*?"<>|]', '-'

          New-Item -ItemType Directory -Force -Path embedr | Out-Null
          Copy-Item "$env:Q_ARCH" -Destination ".\embedr\$env:Q_ARCH" -Recurse
          Copy-Item rinit.q -Destination .\embedr
          Copy-Item rtest.q -Destination .\embedr
          Copy-Item LICENSE -Destination .\embedr\LICENSE.embedr
          Copy-Item README.md -Destination .\embedr\README.embedr

          7z a "embedr_win$env:BITS-$version.zip" ".\embedr\*"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: embedr_win64
          path: embedr_win*.zip
          if-no-files-found: error
