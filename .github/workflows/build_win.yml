jobs:
  build-windows:
    name: Windows ${{ matrix.bits }}-bit
    runs-on: windows-latest

    env:
      BITS: 64
      R_ARCH: x64
      Q_ARCH: w64
      R_HOME: C:\R                    # Remove trailing backslash

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.5.3"

      - name: Verify R installation
        shell: pwsh
        run: |
          $maxRetries = 5
          $retryCount = 0
          while ($retryCount -lt $maxRetries) {
            try {
              $R_HOME = & R.exe RHOME
              if ($LASTEXITCODE -eq 0 -and $R_HOME) {
                Write-Host "R_HOME: $R_HOME"
                & R.exe --version
                if ($LASTEXITCODE -eq 0) {
                  Write-Host "R installation verified successfully"
                  exit 0
                }
              }
            } catch {
              Write-Host "Attempt $($retryCount + 1) failed, retrying..."
            }
            $retryCount++
            Start-Sleep -Seconds 2
          }
          throw "R installation verification failed after $maxRetries attempts"

      - name: Build embedr.dll
        shell: pwsh
        run: |
          $R_HOME = & R.exe RHOME
          $env:PATH = "$R_HOME\bin;$R_HOME\bin\x64;$env:PATH"
          New-Item -ItemType Directory -Force -Path $env:Q_ARCH | Out-Null
          & R.exe CMD SHLIB -o "$env:Q_ARCH/embedr.dll" embedr.c src/$env:Q_ARCH/q.a -lws2_32
          if ($LASTEXITCODE -ne 0) { exit 1 }

      - name: Package distribution
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}" -replace '[\\/:*?"<>|]', '-'

          New-Item -ItemType Directory -Force -Path embedr | Out-Null
          Copy-Item "$env:Q_ARCH" -Destination ".\embedr\$env:Q_ARCH" -Recurse
          Copy-Item rinit.q -Destination .\embedr
          Copy-Item rtest.q -Destination .\embedr
          Copy-Item LICENSE -Destination .\embedr\LICENSE.embedr
          Copy-Item README.md -Destination .\embedr\README.embedr

          7z a "embedr_win$env:BITS-$version.zip" ".\embedr\*"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: embedr_win64
          path: embedr_win*.zip
          if-no-files-found: error
