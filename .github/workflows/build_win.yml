name: Windows build

on:
  push:
    branches:
      - master
    tags:
      - "v*"
  pull_request:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    name: Windows ${{ matrix.bits }}-bit
    runs-on: windows-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - bits: 64
            r_arch: x64
            q_arch: w64
          - bits: 32
            r_arch: i386
            q_arch: w32

    env:
      BITS: ${{ matrix.bits }}
      R_ARCH: ${{ matrix.r_arch }}
      Q_ARCH: ${{ matrix.q_arch }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      # R 4.1.x is intentional here: R for Windows 4.2+ dropped 32-bit/i386 support.
      # The old AppVeyor matrix built both x64 and i386, so use an R release that still
      # includes both architectures.
      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.1.3"
          rtools-version: "40"

      - name: Show R installation
        shell: cmd
        run: |
          echo Checking R installation...
          dir C:\R\bin 2>nul || echo R bin directory not found
          dir C:\R\bin\x64 2>nul || echo R bin\x64 directory not found
          where R.exe
          R.exe --version
          R.exe RHOME

      - name: Build embedr.dll
        shell: cmd
        run: |
          for /f "delims=" %%i in ('R.exe RHOME') do set R_HOME=%%i
          set PATH=%R_HOME%\bin;%R_HOME%\bin\x64;%PATH%
          mkdir %Q_ARCH%
          R.exe CMD SHLIB -o %Q_ARCH%/embedr.dll embedr.c src/%Q_ARCH%/q.a -lws2_32

      - name: Package distribution
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}" -replace '[\\/:*?"<>|]', '-'

          New-Item -ItemType Directory -Force -Path embedr | Out-Null
          Copy-Item "$env:Q_ARCH" -Destination ".\embedr\$env:Q_ARCH" -Recurse
          Copy-Item rinit.q -Destination .\embedr
          Copy-Item rtest.q -Destination .\embedr
          Copy-Item LICENSE -Destination .\embedr\LICENSE.embedr
          Copy-Item README.md -Destination .\embedr\README.embedr

          7z a "embedr_win$env:BITS-$version.zip" ".\embedr\*"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: embedr_win${{ matrix.bits }}
          path: embedr_win*.zip
          if-no-files-found: error
